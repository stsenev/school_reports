{% extends 'base.html' %}

{% block title %}Страница не найдена{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 text-center">
        <div class="display-1 text-muted mb-4">404</div>
        <h2 class="mb-3">Страница не найдена</h2>
        <p class="text-muted mb-4">Запрашиваемая страница не существует или была перемещена.</p>
        <a href="{% url 'dashboard' %}" class="btn btn-primary">
            <i class="fas fa-home me-2"></i>Вернуться на главную
        </a>
    </div>
</div>
{% endblock %}
