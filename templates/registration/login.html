{% extends 'base.html' %}
{% load crispy_forms_tags %}
{% block title %}Вход в систему{% endblock %}
{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6 col-lg-4">
        <div class="card shadow">
            <div class="card-header bg-primary text-white text-center">
                <h4 class="mb-0"><i class="fas fa-sign-in-alt me-2"></i>Вход в систему</h4>
            </div>
            <div class="card-body">
                <form method="post">{% csrf_token %}{{ form|crispy }}
                    <div class="d-grid gap-2 mt-3"><button type="submit" class="btn btn-primary"><i class="fas fa-sign-in-alt me-2"></i>Войти</button></div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
