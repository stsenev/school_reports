<div class="dynamic-formset age-group-row">
    <div class="row">
        <div class="col-md-4">
            <div class="mb-3">
                <label class="form-label">Год рождения</label>
                <input type="number" name="age-{{ index }}-birth_year" class="form-control" min="2000" max="2030" value="{{ form.birth_year.value|default:'' }}">
            </div>
        </div>
        <div class="col-md-3">
            <div class="mb-3">
                <label class="form-label">Мальчики</label>
                <input type="number" name="age-{{ index }}-boys_count" class="form-control" min="0" value="{{ form.boys_count.value|default:'' }}">
            </div>
        </div>
        <div class="col-md-3">
            <div class="mb-3">
                <label class="form-label">Девочки</label>
                <input type="number" name="age-{{ index }}-girls_count" class="form-control" min="0" value="{{ form.girls_count.value|default:'' }}">
            </div>
        </div>
        <div class="col-md-2">
            <button type="button" class="btn btn-danger btn-sm remove-row" style="margin-top: 2rem;">
                <i class="fas fa-trash"></i> Удалить
            </button>
        </div>
    </div>
</div>
