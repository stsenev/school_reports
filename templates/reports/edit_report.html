{% extends 'base.html' %}

{% block title %}Редактирование отчета{% endblock %}

{% block content %}
<div class="container">

    <div class="d-flex justify-content-between align-items-center flex-wrap gap-3 mb-4">
        <div>
            <h1 class="mb-1">
                <i class="fas fa-edit text-primary me-2"></i>
                Редактирование отчета
            </h1>
            <p class="text-muted mb-0">
                {{ report.school_class.name }} · {{ report.period.name }} · {{ report.period.academic_year }}
            </p>
        </div>

        <div class="d-flex gap-2">
            <a href="{% url 'view_report' report.id %}" class="btn btn-outline-primary">
                <i class="fas fa-eye me-2"></i>
                Просмотр
            </a>
            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
                <i class="fas fa-arrow-left me-2"></i>
                Назад
            </a>
        </div>
    </div>

    <form method="post">
        {% csrf_token %}

        <div class="card shadow-sm border-0">
            <div class="card-body">

                <div class="mb-3">
                    <label for="status" class="form-label">Статус</label>
                    <select name="status" id="status" class="form-select">
                        <option value="draft" {% if report.status == 'draft' %}selected{% endif %}>Черновик</option>
                        <option value="rejected" {% if report.status == 'rejected' %}selected{% endif %}>На доработке</option>
                        <option value="approved" {% if report.status == 'approved' %}selected{% endif %}>Утвержден</option>
                    </select>
                </div>

            </div>
            <div class="card-footer bg-white d-flex gap-2">
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-save me-2"></i>
                    Сохранить
                </button>
                <a href="{% url 'view_report' report.id %}" class="btn btn-outline-secondary">
                    Отмена
                </a>
            </div>
        </div>
    </form>

</div>
{% endblock %}
