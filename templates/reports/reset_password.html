{% extends 'base.html' %}

{% block title %}Сброс пароля{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-warning">
                <h3 class="mb-0">
                    <i class="fas fa-key me-2"></i>
                    Сброс пароля
                </h3>
            </div>
            <div class="card-body">
                <p class="mb-3">Учитель: <strong>{{ teacher.full_name }}</strong></p>
                <p class="mb-3">Логин: <strong>{{ teacher.user.username }}</strong></p>

                <form method="post">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Новый пароль</label>
                        <input type="text" name="new_password" class="form-control"
                               value="password{{ teacher.id }}" required>
                        <small class="text-muted">Рекомендуется сменить пароль при первом входе</small>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-warning">
                            <i class="fas fa-sync-alt me-2"></i>Сбросить пароль
                        </button>
                        <a href="{% url 'teacher_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
