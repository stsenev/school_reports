{% extends 'base.html' %}

{% block title %}Назначение классов{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3 class="mb-0">
                    <i class="fas fa-chalkboard-teacher me-2"></i>
                    Назначение классов учителю
                </h3>
            </div>
            <div class="card-body">
                <h5 class="mb-3">Учитель: {{ teacher.full_name }}</h5>

                <form method="post">
                    {% csrf_token %}

                    <div class="mb-3">
                        <label class="form-label">Выберите классы</label>
                        <div class="border rounded p-3" style="max-height: 300px; overflow-y: auto;">
                            {% for class in classes %}
                            <div class="form-check">
                                <input type="checkbox"
                                       name="classes"
                                       value="{{ class.id }}"
                                       class="form-check-input"
                                       id="class_{{ class.id }}"
                                       {% if class.id in current_classes %}checked{% endif %}>
                                <label class="form-check-label" for="class_{{ class.id }}">
                                    {{ class.name }}
                                </label>
                            </div>
                            {% endfor %}
                        </div>
                    </div>

                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>Сохранить
                        </button>
                        <a href="{% url 'teacher_list' %}" class="btn btn-secondary">
                            <i class="fas fa-times me-2"></i>Отмена
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
