<div class="dynamic-formset card mb-2 p-2
{% if type == 'poor' and form.instance.is_recurring %}border-danger{% endif %}">

    <div class="mb-3">
        <label class="form-label">
            ФИО ученика

            {% if type == 'poor' and form.instance.is_recurring %}
                <span class="badge bg-danger ms-2">
                    ⚠ Сквозной двоечник
                </span>
            {% endif %}
        </label>

        <input type="text"
               name="{{ form.full_name.html_name }}"
               class="form-control"
               value="{{ form.full_name.value|default:'' }}">
    </div>

    <div class="row">
        <div class="col-md-8">
            <div class="mb-3">
                <label class="form-label">Предмет</label>

                <select name="{{ form.subject_choice.html_name }}"
                        class="form-select subject-choice">

                    <option value="">---------</option>

                    {% for code, name in subjects %}
                        <option value="{{ code }}"
                        {% if form.subject_code.value == code %}
                            selected
                        {% endif %}
                        >
                            {{ name }}
                        </option>
                    {% endfor %}

                    <option value="other"
                    {% if form.subject_code.value == 'other' %}
                        selected
                    {% endif %}
                    >
                        Другой предмет
                    </option>

                </select>
            </div>
        </div>

        <div class="col-md-4">
            <div class="mb-3">
                <label class="form-label">Учитель</label>

                <input type="text"
                       name="{{ form.teacher.html_name }}"
                       class="form-control"
                       value="{{ form.teacher.value|default:'' }}">
            </div>
        </div>
    </div>

    <div class="row custom-subject-row"
         style="{% if form.subject_code.value == 'other' %}display:block{% else %}display:none{% endif %};">

        <div class="col-12">
            <div class="mb-3">
                <label class="form-label">Другой предмет (укажите)</label>

                <input type="text"
                       name="{{ form.custom_subject.html_name }}"
                       class="form-control custom-subject"
                       value="{{ form.custom_subject.value|default:'' }}">
            </div>
        </div>

    </div>

    <input type="hidden"
           name="{{ form.subject.html_name }}"
           class="subject-hidden"
           value="{{ form.subject.value|default:'' }}">

    <input type="hidden"
           name="{{ form.subject_code.html_name }}"
           class="subject-code-hidden"
           value="{{ form.subject_code.value|default:'' }}">

    <div class="text-end">
        <button type="button" class="btn btn-danger btn-sm remove-row">
            <i class="fas fa-trash"></i> Удалить
        </button>
    </div>

</div>
