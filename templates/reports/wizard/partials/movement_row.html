<!-- templates/reports/wizard/partials/movement_row.html -->
<div class="dynamic-formset {{ type }}going-row">
    <input type="hidden" name="{{ movement_form.movement_type.html_name }}" value="{{ type }}">
    <div class="mb-3">
        <label class="form-label">ФИО ученика</label>
        <input type="text" name="{{ movement_form.student_name.html_name }}"
               class="form-control" value="{{ movement_form.student_name.value|default:'' }}">
    </div>
    {% if type == 'out' %}
        <div class="row">
            <div class="col-md-6">
                <div class="form-check mb-3">
                    <input type="checkbox" name="{{ movement_form.moved_to_another_class.html_name }}"
                           class="form-check-input" {% if movement_form.moved_to_another_class.value %}checked{% endif %}>
                    <label class="form-check-label">Выбыл в другой класс</label>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-check mb-3">
                    <input type="checkbox" name="{{ movement_form.moved_to_another_school.html_name }}"
                           class="form-check-input" {% if movement_form.moved_to_another_school.value %}checked{% endif %}>
                    <label class="form-check-label">Выбыл в другую школу</label>
                </div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Класс</label>
            <select name="{{ movement_form.target_class.html_name }}" class="form-select">
                <option value="">---------</option>
                {% for class in classes %}
                <option value="{{ class.id }}" {% if movement_form.target_class.value|stringformat:"s" == class.id|stringformat:"s" %}selected{% endif %}>
                    {{ class.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Школа</label>
            <input type="text" name="{{ movement_form.target_school.html_name }}"
                   class="form-control" value="{{ movement_form.target_school.value|default:'' }}">
        </div>
    {% else %}
        <div class="row">
            <div class="col-md-6">
                <div class="form-check mb-3">
                    <input type="checkbox" name="{{ movement_form.came_from_another_class.html_name }}"
                           class="form-check-input" {% if movement_form.came_from_another_class.value %}checked{% endif %}>
                    <label class="form-check-label">Прибыл из другого класса</label>
                </div>
            </div>
            <div class="col-md-6">
                <div class="form-check mb-3">
                    <input type="checkbox" name="{{ movement_form.came_from_another_school.html_name }}"
                           class="form-check-input" {% if movement_form.came_from_another_school.value %}checked{% endif %}>
                    <label class="form-check-label">Прибыл из другой школы</label>
                </div>
            </div>
        </div>
        <div class="mb-3">
            <label class="form-label">Класс</label>
            <select name="{{ movement_form.source_class.html_name }}" class="form-select">
                <option value="">---------</option>
                {% for class in classes %}
                <option value="{{ class.id }}" {% if movement_form.source_class.value|stringformat:"s" == class.id|stringformat:"s" %}selected{% endif %}>
                    {{ class.name }}
                </option>
                {% endfor %}
            </select>
        </div>
        <div class="mb-3">
            <label class="form-label">Школа</label>
            <input type="text" name="{{ movement_form.source_school.html_name }}"
                   class="form-control" value="{{ movement_form.source_school.value|default:'' }}">
        </div>
    {% endif %}
    <div class="mb-3">
        <label class="form-label">Номер приказа</label>
        <input type="text" name="{{ movement_form.order_number.html_name }}"
               class="form-control" value="{{ movement_form.order_number.value|default:'' }}">
    </div>
    <div class="mb-3">
        <label class="form-label">Дата приказа</label>
        <input type="date" name="{{ movement_form.order_date.html_name }}"
               class="form-control" value="{{ movement_form.order_date.value|date:'Y-m-d'|default:'' }}">
    </div>
    <div class="text-end">
        <button type="button" class="btn btn-danger btn-sm remove-row">
            <i class="fas fa-trash me-1"></i> Удалить
        </button>
    </div>
</div>
